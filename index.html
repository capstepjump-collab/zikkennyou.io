<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psychology Experiment</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; align-items: center; position: relative; }
        #counter { position: absolute; top: 30px; right: 40px; font-size: 1.8rem; font-weight: bold; color: #444; background: rgba(255,255,255,0.8); padding: 10px 20px; border-radius: 20px; }
        #experiment-container { text-align: center; max-width: 900px; width: 90%; padding: 40px; box-sizing: border-box; }
        h1 { font-size: 3rem; color: #222; margin-bottom: 30px; }
        p { font-size: 1.5rem; color: #444; line-height: 1.8; margin-bottom: 20px; }
        /* 💡 刺激語エリアを画像（縦横最大350pxの正方形）に最適化しました */
        #stimulus-container { width: 100%; min-height: 350px; margin-bottom: 50px; display: flex; align-items: center; justify-content: center; }
        #stimulus-img { max-width: 350px; max-height: 350px; object-fit: contain; user-select: none; -webkit-user-drag: none; }
        
        .button-container { display: flex; justify-content: center; gap: 50px; flex-wrap: wrap; }
        .btn { padding: 25px 60px; font-size: 2rem; font-weight: bold; cursor: pointer; border: none; border-radius: 15px; background: #fff; box-shadow: 0 8px 16px rgba(0,0,0,0.1); transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        .lang-btn { background: #007bff; color: white; margin: 15px; }
        
        #data-box { width: 100%; height: 180px; font-family: monospace; font-size: 1.1rem; margin-top: 30px; padding: 15px; box-sizing: border-box; border: 2px solid #ccc; border-radius: 10px; background: #fff; resize: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="counter" class="hidden"><span id="counter-label">残り</span>: <span id="remaining">15</span></div>
    <div id="experiment-container">
        <!-- 言語選択画面 -->
        <div id="lang-screen">
            <h1>Language / 言語選択</h1>
            <p>Please select your language.<br>言語を選択してください。</p>
            <div class="button-container">
                <button class="btn lang-btn" onclick="selectLanguage('ja')">日本語</button>
                <button class="btn lang-btn" onclick="selectLanguage('en')">English</button>
            </div>
        </div>
        <!-- 導入画面 -->
        <div id="start-screen" class="hidden">
            <h1 id="start-title"></h1>
            <p id="start-desc1"></p>
            <p id="start-desc2"></p>
            <button class="btn" id="start-btn" onclick="startExperiment()"></button>
        </div>
        <!-- メイン画面（文字ではなく画像を表示する構造に変更） -->
        <div id="trial-screen" class="hidden">
            <div id="stimulus-container">
                <img id="stimulus-img" src="" alt="stimulus">
            </div>
            <div class="button-container">
                <button class="btn" id="choice-round" onclick="handleResponse('round')"></button>
                <button class="btn" id="choice-sharp" onclick="handleResponse('sharp')"></button>
            </div>
        </div>
        <!-- 終了画面 -->
        <div id="end-screen" class="hidden">
            <h1 id="end-title"></h1>
            <p id="end-desc"></p>
            <p style="font-size: 1.1rem; color: #666; margin-top: 40px;">【管理者用データ】以下の枠内のテキストをコピーして保存してください：</p>
            <textarea id="data-box" readonly onclick="this.select()"></textarea>
        </div>
    </div>
    <script>
        // あなたの画像ファイル名（文字_フォント形式.png）と完全連動させました
        const stimuliWords = [
            { text: 'ブーバ', type: 'round', lang: 'ja', fileBase: 'booba' },
            { text: 'マロ', type: 'round', lang: 'ja', fileBase: 'maro' },
            { text: 'ルル', type: 'round', lang: 'ja', fileBase: 'lulu' },
            { text: 'モコ', type: 'round', lang: 'ja', fileBase: 'moko' },
            { text: 'キキ', type: 'sharp', lang: 'ja', fileBase: 'kiki' },
            { text: 'タケテ', type: 'sharp', lang: 'ja', fileBase: 'takete' },
            { text: 'カキ', type: 'sharp', lang: 'ja', fileBase: 'kaki' },
            { text: 'トゲ', type: 'sharp', lang: 'ja', fileBase: 'toge' },
            { text: 'Bouba', type: 'round', lang: 'en', fileBase: 'booba' },
            { text: 'Malo', type: 'round', lang: 'en', fileBase: 'malo' },
            { text: 'Lulu', type: 'round', lang: 'en', fileBase: 'lulu' },
            { text: 'Moko', type: 'round', lang: 'en', fileBase: 'moko' },
            { text: 'Kiki', type: 'sharp', lang: 'en', fileBase: 'kiki' },
            { text: 'Takete', type: 'sharp', lang: 'en', fileBase: 'takete' },
            { text: 'Kaki', type: 'sharp', lang: 'en', fileBase: 'kaki' },
            { text: 'Toge', type: 'sharp', lang: 'en', fileBase: 'toge' },
            { text: '○○○', type: 'round', lang: 'both', fileBase: 'maru_symbol' },
            { text: '×××', type: 'sharp', lang: 'both', fileBase: 'batsu_symbol' }
        ];
        const fonts = ['round', 'sharp', 'neutral'];
        let trials = [], currentTrialIndex = 0, startTime, results = [], selectedLang = 'ja';
        const textData = {
            ja: { counter: "残り", title: "実験開始", d1: "表示される文字が「丸い」か「角ばっている」か判断してください。", d2: "できるだけ<strong>速く、正確に</strong>ボタンを押してください。", start: "開始する", round: "丸い", sharp: "角ばった", endT: "実験終了", endD: "ご協力ありがとうございました。" },
            en: { counter: "Remaining", title: "Experiment Start", d1: "Please judge whether the displayed word feels 'Round' or 'Sharp'.", d2: "Please press the button as <strong>fast and accurately</strong> as possible.", start: "Start", round: "Round", sharp: "Sharp", endT: "Experiment Completed", endD: "Thank you for your cooperation." }
        };
        function selectLanguage(lang) {
            selectedLang = lang;
            const d = textData[lang];
            document.getElementById('counter-label').innerText = d.counter;
            document.getElementById('start-title').innerText = d.title;
            document.getElementById('start-desc1').innerHTML = d.d1;
            document.getElementById('start-desc2').innerHTML = d.d2;
            document.getElementById('start-btn').innerText = d.start;
            document.getElementById('choice-round').innerText = d.round;
            document.getElementById('choice-sharp').innerText = d.sharp;
            document.getElementById('end-title').innerText = d.endT;
            document.getElementById('end-desc').innerText = d.endD;
            document.getElementById('lang-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        function setupTrials() {
            const filtered = stimuliWords.filter(w => w.lang === selectedLang || w.lang === 'both');
            let round_sharp_pool = [], sharp_round_pool = [], normal_pool = [];      
            filtered.forEach(w => {
                fonts.forEach(f => {
                    // 記号（both）の場合はフォントを固定して読み込む特殊処理
                    if (w.lang === 'both') {
                        if (w.fileBase === 'maru_symbol' && f === 'round') { normal_pool.push({ ...w, font: f, imgPath: 'images/maru_symbol.png' }); }
                        if (w.fileBase === 'batsu_symbol' && f === 'sharp') { normal_pool.push({ ...w, font: f, imgPath: 'images/batsu_symbol.png' }); }
                    } else {
                        const path = 'images/' + w.fileBase + '_' + f + '.png';
                        const item = { ...w, font: f, imgPath: path };
                        if (w.type === 'round' && f === 'sharp') { round_sharp_pool.push(item); } 
                        else if (w.type === 'sharp' && f === 'round') { sharp_round_pool.push(item); } 
                        else { normal_pool.push(item); }
                    }
                });
            });
            shuffle(round_sharp_pool); shuffle(sharp_round_pool); shuffle(normal_pool);
            let selectedTrials = [];
            selectedTrials.push(round_sharp_pool.pop()); selectedTrials.push(round_sharp_pool.pop());
            selectedTrials.push(sharp_round_pool.pop()); selectedTrials.push(sharp_round_pool.pop());
            let remainsPool = [...normal_pool, ...round_sharp_pool, ...sharp_round_pool];
            shuffle(remainsPool);
            for (let i = 0; i < 11; i++) { selectedTrials.push(remainsPool.pop()); }
            trials = shuffle(selectedTrials);
        }
        function startExperiment() {
            setupTrials();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('counter').classList.remove('hidden');
            document.getElementById('trial-screen').classList.remove('hidden');
            nextTrial();
        }
        function nextTrial() {
            if (currentTrialIndex >= trials.length) {
                showResults();
                return;
            }
            document.getElementById('remaining').innerText = trials.length - currentTrialIndex;
            const t = trials[currentTrialIndex];
            
            // 💡 画面の<img>要素に、対応する画像のパスを流し込みます
            document.getElementById('stimulus-img').src = t.imgPath;
            
            startTime = performance.now();
        }
        function handleResponse(res) {
            const rt = performance.now() - startTime;
            let fontName = "ゴシック";
            if(trials[currentTrialIndex].font === "round") fontName = "丸フォント";
            if(trials[currentTrialIndex].font === "sharp") fontName = "Stickフォント";
            let responseName = res === "round" ? "丸い" : "角ばった";
            results.push({
                word: trials[currentTrialIndex].text,
                font: fontName,
                response: responseName,
                rt: Math.round(rt) + "ms"
            });
            currentTrialIndex++;
            nextTrial();
        }
        function showResults() {
            document.getElementById('trial-screen').classList.add('hidden');
            document.getElementById('counter').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            const t = String.fromCharCode(9);
            const n = String.fromCharCode(10);
            let o = "単語" + t + "フォント" + t + "回答" + t + "反応時間" + n;
            results.forEach(r => { o += r.word + t + r.font + t + r.response + t + r.rt + n; });
            document.getElementById('data-box').value = o;
        }
    </script>
</body>
</html>
